<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - GOI Retrieval</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-building-columns"></i>
            GOI <span>Retrieval</span>
        </a>
    </header>

    <main class="container-sm glass">
        <h2 style="margin-bottom: 20px; color: var(--error);">Delete Account</h2>
        
        <div class="warning-box">
            <p><strong>Warning:</strong> This action is permanent and cannot be undone. Once deleted, you will lose access to all your saved reports, audit history, and active subscriptions.</p>
        </div>

        <form id="deleteAccountForm">
            <div class="form-group">
                <label>Reason for leaving (Optional)</label>
                <textarea rows="3" placeholder="Tell us how we can improve..."></textarea>
            </div>

            <div class="form-group">
                <label>To confirm, type <span style="color: var(--error); font-weight: 800;">DELETE</span> in the box below:</label>
                <input type="text" id="confirmText" placeholder="Type DELETE here">
            </div>

            <button type="submit" id="deleteBtn" class="btn btn-danger" disabled style="opacity: 0.5; cursor: not-allowed;">Permanently Delete My Account</button>
            <p style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Cancel and return back</a>
            </p>
        </form>
    </main>

    <footer style="margin-bottom: 40px;">
        <p>&copy; 2026 GOI Retrieval Portal. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
